version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx_app
    ports:
      - "8080:80"
    volumes:
      - app_data:/var/www/html
      - nginx_conf:/etc/nginx/conf.d
    depends_on:
      - php
    networks:
      - app_network

  php:
    image: php:8.1-fpm
    container_name: php_app
    volumes:
      - app_data:/var/www/html
    command: >
      sh -c "docker-php-ext-install mysqli pdo pdo_mysql && php-fpm"
    networks:
      - app_network

  mysql:
    image: mysql:5.7
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dbku
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_app
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - app_network

volumes:
  app_data:
  db_data:
  nginx_conf:

networks:
  app_network: